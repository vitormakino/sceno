[package]
name = "lyrics-on-screen"
version = "0.1.0"
edition = "2021"

[dependencies]
iced_layershell = "0.18"
iced = "0.14"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "time"] }
