name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # macOS compiles the portable subset only: the shared overlay shell (plain-iced
  # window backend), the mic apps (`tuner`/`vocalize`), and `lyrics` + `media`
  # (now-playing via the AppleScript backend). `karaoke`/`metronome` stay
  # Linux-only until their libs are ported. This job proves the non-Linux code
  # paths build; runtime behavior (window, mic, osascript) is validated manually
  # on a Mac. No apt step — CoreAudio/Cocoa ship with the runner.
  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -p overlay -p pitch -p tuner -p vocalize -p media -p lyrics --all-targets -- -D warnings

      - name: Build
        run: cargo build -p overlay -p pitch -p tuner -p vocalize -p media -p lyrics

      - name: Test
        run: cargo test -p overlay -p pitch -p tuner -p vocalize -p media -p lyrics
